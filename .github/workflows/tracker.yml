name: tracker

# Автономный прогон трекера: снимает цены, сохраняет прогон в tracker-data,
# считает diff и шлёт значимые изменения в Telegram — без Claude/MCP.
on:
  workflow_dispatch:
  schedule:
    # каждый день в 08:00 UTC (расписание работает только на ветке по умолчанию)
    - cron: "0 8 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # PAT с доступом на запись в приватный tracker-data.
          # GITHUB_TOKEN сюда не подходит — он ограничен текущим репозиторием.
          GH_DATA_TOKEN: ${{ secrets.GH_DATA_TOKEN }}
        run: python3 automation/tracker_run.py
