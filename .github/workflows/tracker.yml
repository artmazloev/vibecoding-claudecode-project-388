name: tracker

# Автономный прогон трекера: снимает цены, сохраняет прогон в tracker-data,
# считает diff и шлёт значимые изменения в Telegram — без Claude/MCP.
#
# Расписание отключено намеренно: целевые ретейлеры блокируют IP GitHub-раннеров
# (антибот), поэтому автономный прогон с hosted-раннера не снимает цены. Основной
# способ запуска — локально через Claude Code (свой IP + браузер), где скиллы
# extract-price/tracker работают. Ручной запуск (workflow_dispatch) оставлен на
# случай, если список URL сменят на источники без антибота.
on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # PAT с доступом на запись в приватный tracker-data.
          # GITHUB_TOKEN сюда не подходит — он ограничен текущим репозиторием.
          GH_DATA_TOKEN: ${{ secrets.GH_DATA_TOKEN }}
        run: python3 automation/tracker_run.py
